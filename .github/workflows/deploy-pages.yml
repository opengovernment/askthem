# GitHub Actions workflow to deploy a static site to GitHub Pages.
#
# Usage:
#   1. Copy this file into your static site repo at .github/workflows/deploy-pages.yml
#   2. Go to repo Settings → Pages → Source → select "GitHub Actions"
#   3. Push to the main branch — the site deploys automatically.

name: Deploy Static Site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: # allows manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repo root as the site.
          # Change this to './docs' or './public' if your HTML lives in a subfolder.
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
